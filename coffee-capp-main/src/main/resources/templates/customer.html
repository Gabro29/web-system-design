<!DOCTYPE html>
<html lang="it">

<head>
    <meta charset="UTF-8">
    <meta name="_csrf" th:content="${_csrf.token}"/>
    <meta name="_csrf_header" th:content="${_csrf.headerName}"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Coffee cApp UNIPA - Area Cliente">
    <title>Coffee cApp UNIPA - Cliente</title>

    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="/css/global.css">


    <link rel="icon" type="image/png" href="/data/images/icons/favicon-96x96.png" sizes="96x96" />
    <link rel="icon" type="image/svg+xml" href="/data/images/icons/favicon.svg" />

</head>
<body>


<!-- REGISTRAZIONE -->
<div id="register" class="page active">
    <h2>Registrazione</h2>

    <form id="register-form" onsubmit="handleRegister(); return false;">
        <label for="register-email">Email</label>
        <input
                type="email"
                id="register-email"
                name="email"
                placeholder="mario.rossi@domain.it"
                title="Inserisci un indirizzo email valido"
                required
        />

        <label for="register-password">Password</label>
        <input
                type="password"
                id="register-password"
                name="password"
                placeholder="Minimo 8 caratteri"
                minlength="8"
                title="La password deve contenere almeno 8 caratteri"
                required
        />

        <label for="register-password-repeat">Ripeti Password</label>
        <input
                type="password"
                id="register-password-repeat"
                name="passwordRepeat"
                placeholder="Ripeti password"
                minlength="8"
                title="Ripeti la password"
                required
        />

        <button type="submit">Registrati</button>
        <p>Hai già un account? <a href="#" onclick="showPage('login'); return false;">Login</a></p>
    </form>
</div>


<!-- LOGIN -->
<div id="login" class="page">
    <h2>Login</h2>

    <form id="login-form" onsubmit="handleLogin(); return false;">
        <label for="login-email">Email</label>
        <input
                type="email"
                id="login-email"
                name="email"
                placeholder="mario.rossi@domain.it"
                title="Inserisci un indirizzo email valido"
                required
        />

        <label for="login-password">Password</label>
        <input
                type="password"
                id="login-password"
                name="password"
                placeholder="Password"
                required
        />

        <button type="submit">Accedi</button>
        <p>Non hai un account? <a href="#" onclick="showPage('register'); return false;">Registrati</a></p>
    </form>
</div>


<!-- HOME -->
<div id="home" class="page">
    <h2>Home</h2>

    <h4>Buongiornissimo <span id="username"></span>, Kaffè?</h4>
    <p>Credito: €<span id="credit">0.00</span></p>
    <p>Stato: <span id="status"></span></p>
    <p>Macchina: <span id="machine-display">-</span></p>

    <label for="machine-id">ID Macchina</label>
    <input
            type="text"
            id="machine-id"
            name="machineId"
            placeholder="Formato: FE716XW"
            title="Formato: 2 lettere maiuscole, 3 numeri, 2 lettere maiuscole (es. FE716XW)"
            maxlength="7"
            oninput="this.value = this.value.toUpperCase()"
    />

    <button type="button" id="btn-connect">Connetti</button>
    <button type="button" id="btn-disconnect" class="hidden">Disconnetti</button>

    <button type="button" onclick="showPage('recharge')">Ricarica Credito</button>
    <button type="button" id="btn-show-map" style="background-color: #17a2b8; margin-top: 10px;" onclick="MapController.open()">Mappa Distributori</button>

    <button class="btn-cancel" type="button" onclick="handleLogout()">Log out</button>
</div>


<!-- RICARICA -->
<div id="recharge" class="page">

    <h2>Ricarica Credito</h2>

    <!-- PROGRESS BAR per simulare elaborazione pagamento -->
    <div id="progress-section" class="hidden">
        <p id="progress-text">Elaborazione pagamento...</p>
        <div class="progress-bar-machine">
            <div class="progress-fill" id="progress-fill"></div>
        </div>
    </div>

    <form id="recharge-form" onsubmit="handleRecharge(); return false;">
        <label for="amount">Importo (€)</label>
        <input
                type="number"
                id="amount"
                name="amount"
                placeholder="Importo (€)"
                min="5"
                max="100"
                step="5"
                required
        />

        <label for="card-number">Numero Carta</label>
        <input
                type="text"
                id="card-number"
                name="cardNumber"
                placeholder="16 cifre"
                pattern="[0-9]{16}"
                title="16 cifre numeriche"
                maxlength="16"
                required
        />

        <label for="card-expiry">Scadenza</label>
        <input
                type="text"
                id="card-expiry"
                name="cardExpiry"
                placeholder="MM/AA"
                pattern="(0[1-9]|1[0-2])\/[0-9]{2}"
                title="Formato MM/AA (es. 12/25)"
                maxlength="5"
                required
        />

        <label for="card-cvv">CVV</label>
        <input
                type="text"
                id="card-cvv"
                name="cardCvv"
                placeholder="CVV"
                pattern="[0-9]{3}"
                title="3 cifre numeriche"
                maxlength="3"
                required
        />

        <button type="submit">Conferma Ricarica</button>
        <button class="btn-cancel" type="button" onclick="showHomePage()">Annulla</button>
    </form>
</div>



<!-- MAPPA -->
<div id="map-modal" class="modal">
    <div class="modal-content">
        <span class="close-btn" onclick="MapController.close()">&times;</span>
        <h3>Mappa Distributori</h3>
        <div id="map-container">Caricamento Mappa...</div>
    </div>
</div>


<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="/js/jquery-3.7.1.min.js"></script>
<script th:inline="javascript">
    window.APP_CONFIG = {
        JAKARTA_SERVER: [[${jakartaServerUrl}]]
    };
</script>
<script src="/js/global.js"></script>
<script src="/js/customer.js"></script>

</body>

</html>
