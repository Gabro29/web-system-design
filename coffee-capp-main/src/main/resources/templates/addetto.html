<!DOCTYPE html>
<html lang="it">

<head>
    <meta charset="UTF-8">
    <meta name="_csrf" th:content="${_csrf.token}"/>
    <meta name="_csrf_header" th:content="${_csrf.headerName}"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Coffee cApp UNIPA - Area Addetto">
    <title>Coffee cApp UNIPA - Addetto</title>

    <link rel="stylesheet" href="/css/global.css">
    <link rel="stylesheet" href="/css/addetto.css">

    <link rel="icon" type="image/png" href="/data/images/icons/favicon-96x96.png" sizes="96x96" />
    <link rel="icon" type="image/svg+xml" href="/data/images/icons/favicon.svg" />

</head>
<body>


<!-- LOGIN -->
<div id="login" class="page active">
    <h2>Login</h2>

    <form id="login-form" onsubmit="handleLogin(); return false;">
        <label for="login-email">Email</label>
        <input
                type="email"
                id="login-email"
                name="email"
                placeholder="mario.rossi@domain.it"
                required
        />

        <label for="login-password">Password</label>
        <input
                type="password"
                id="login-password"
                name="password"
                placeholder="Password"
                required
        />

        <button type="submit">Accedi</button>
    </form>
</div>


<!-- HOME -->
<div id="home" class="page">
    <h2>Home</h2>

    <h4>Buongiornissimo <span id="username"></span>, a lavoro!</h4>

    <label for="machine-id">ID Macchina</label>
    <input
            type="text"
            id="machine-id"
            name="machineId"
            placeholder="Formato: FE716XW"
            maxlength="7"
            oninput="this.value = this.value.toUpperCase()"
    />

    <button type="button" id="btn-grab-status" onclick="showStatusSelectedMachine()">Acquisisci stato</button>

    <!-- STATO MACCHINA -->
    <div id="machine-status" class="machine-status-card hidden">
        <div class="card-header">
            <h3>Macchina <span id="current-machine-id">-</span></h3>
        </div>

        <div class="status-row">
            <span style="font-weight: bold;">Stato:</span>
            <span class="status-badge active" id="machine-state"></span>

            <button type="button" id="btn-change-status" class="btn-mini-action btn-status-change" onclick="prepareStatusChange()" title="Cambia stato manutenzione">
                Cambia
            </button>
        </div>

        <!-- FORNITURE -->
        <div class="supplies-section">
            <div class="section-header">
                <h4>Livelli Forniture</h4>
                <button type="button" id="btn-refill" class="btn-mini-action btn-refill-action" onclick="prepareRefill()" title="Ripristina Scorte">
                    Refill ↺
                </button>
            </div>

            <div id="supplies-container"></div>
        </div>

        <!-- ALERT GUASTI -->
        <div class="alerts-section">
            <h4>Alert</h4>
            <div id="alerts-container">
            </div>
        </div>
    </div>
    <button type="button" onclick="handleLogout()" style="background: gray; margin-top: 20px;">Logout</button>
</div>



<!-- POPUP -->
<div id="action-popup" class="popup-overlay hidden">
    <div class="popup-card">
        <h3 class="popup-title" id="popup-title">Conferma Azione</h3>

        <div class="popup-details">
            <p id="popup-message" style="color: #2c1a0e; margin: 15px 0;">
                Messaggio dinamico
            </p>
        </div>

        <div class="popup-actions">
            <button type="button" class="popup-btn popup-btn-cancel" onclick="closePopup()">Annulla</button>
            <button type="button" class="popup-btn popup-btn-confirm" onclick="confirmAction()">Conferma</button>
        </div>
    </div>
</div>

<script src="/js/jquery-3.7.1.min.js"></script>
<script src="/js/global.js"></script>
<script src="/js/addetto.js"></script>

</body>
</html>
